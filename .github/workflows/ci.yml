name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Swift ${{ matrix.swift-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        swift-version:
          - "6.0.3"
          - "6.1.3"
          - "6.2.4"
          - "6.3.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "${{ matrix.swift-version }}"

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

  format:
    name: Format
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check formatting
        run: swiftformat --lint --config .swiftformat Sources Tests Package.swift

  lint:
    name: Lint
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --config .swiftlint.yml
